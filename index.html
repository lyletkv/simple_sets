    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

      } catch (err) {

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r-soft: #2B2930;\n      --primary: #6750A4;\n      --primary-light: #9A84D4;\n      --primary-container: #4A3F7A;\n      --text: #E6E1E5;\n      --text-2: #CAC4D0;\n      --text-3: #938F99;\n      --font: 'Plus Jakarta Sans', sans-serif;\n    }\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    html { scroll-behavior: smooth; font-size: 16px; }\n    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.65; -webkit-font-smoothing: antialiased; }\n\n    .page { max-width: 880px; margin: 0 auto; padding: 56px 32px 80px; }\n\n    /* HERO */\n    .hero { padding: 32px 0 48px; border-bottom: 1px solid var(--border-soft); margin-bottom: 56px; }\n    .hero-logo { display: block; width: 100%; max-width: 360px; height: auto; border-radius: 14px; margin-bottom: 32px; box-shadow: 0 8px 32px rgba(103,80,164,0.25); }\n    .eyebrow { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--primary-light); background: rgba(103,80,164,0.14); padding: 6px 12px; border-radius: 100px; margin-bottom: 20px; }\n    h1 { font-size: clamp(34px, 5vw, 52px); font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; color: var(--text); margin-bottom: 20px; text-wrap: balance; }\n    .lead { font-size: 18px; color: var(--text-2); line-height: 1.6; max-width: 620px; text-wrap: pretty; }\n\n    /* STORE BADGES */\n    .store-badges { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }\n    .store-badge { display: inline-flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 20px 11px 18px; text-decoration: none; transition: border-color 0.15s, background 0.15s, transform 0.15s; }\n    .store-badge:hover { border-color: var(--primary-light); background: var(--surface-2); transform: translateY(-1px); }\n    .store-badge svg { width: 26px; height: 26px; flex-shrink: 0; color: var(--text); }\n    .store-badge span { display: flex; flex-direction: column; line-height: 1.15; color: var(--text); font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }\n    .store-badge span small { font-size: 11px; font-weight: 500; letter-spacing: 0.02em; color: var(--text-3); text-transform: none; }\n    @media (max-width: 600px) { .store-badges { gap: 10px; } .store-badge { flex: 1 1 auto; justify-content: center; } }\n\n    /* SECTIONS */\n    section { margin-bottom: 56px; }\n    .section-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary-light); margin-bottom: 10px; }\n    h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; color: var(--text); margin-bottom: 14px; }\n    p { font-size: 16px; color: var(--text-2); line-height: 1.7; text-wrap: pretty; margin-bottom: 14px; }\n    p:last-child { margin-bottom: 0; }\n    strong { color: var(--text); font-weight: 600; }\n\n    ul { list-style: none; padding: 0; margin: 8px 0 0; display: flex; flex-direction: column; gap: 10px; }\n    li { display: flex; gap: 12px; align-items: flex-start; font-size: 15.5px; color: var(--text-2); line-height: 1.6; padding-left: 0; }\n    li::before { content: \"\"; flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; background: var(--primary-light); margin-top: 10px; }\n\n    /* PREMIUM BLOCK */\n    .premium { background: linear-gradient(180deg, rgba(103,80,164,0.10) 0%, rgba(103,80,164,0.04) 100%); border: 1px solid var(--primary-container); border-radius: 16px; padding: 36px 32px; margin-bottom: 56px; }\n    .premium h2 { margin-bottom: 8px; }\n    .premium .premium-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #C2AAFF; background: var(--primary-container); padding: 4px 10px; border-radius: 100px; margin-bottom: 14px; }\n    .premium ul { margin-top: 18px; gap: 14px; }\n    .premium li { font-size: 15.5px; }\n    .premium li strong { display: block; margin-bottom: 2px; color: var(--text); }\n    .premium li span { color: var(--text-2); }\n\n    /* CTA / TRY */\n    .try { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 16px; padding: 32px; margin-bottom: 56px; }\n    .try h2 { margin-bottom: 10px; }\n\n    /* DOWNLOAD CTA */\n    .download-cta { text-align: center; padding: 8px 0 16px; margin-bottom: 56px; }\n    .download-cta h2 { margin-bottom: 24px; }\n    .download-cta .store-badges { justify-content: center; margin-top: 0; }\n\n    /* FOOTER LINKS */\n    .footer { padding-top: 32px; border-top: 1px solid var(--border-soft); }\n    .footer-links { display: flex; flex-wrap: wrap; gap: 8px 20px; font-size: 14px; color: var(--text-3); }\n    .footer-links a { color: var(--text-2); text-decoration: none; border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s; padding-bottom: 1px; }\n    .footer-links a:hover { color: var(--primary-light); border-color: var(--primary-light); }\n    .footer-links .sep { color: var(--text-3); opacity: 0.5; }\n    .footer-meta { font-size: 13px; color: var(--text-3); margin-top: 16px; }\n\n    @media (max-width: 600px) {\n      .page { padding: 32px 20px 60px; }\n      .hero { padding: 16px 0 32px; margin-bottom: 40px; }\n      section, .premium, .try { margin-bottom: 40px; }\n      .premium, .try { padding: 24px 20px; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"page\">\n\n    <header class=\"hero\">\n      <img class=\"hero-logo\" src=\"6653a2a7-02d5-4b92-9489-b36ef039c497\" alt=\"Simple Sets\">\n      <div class=\"eyebrow\">Simple Sets<\u002Fdiv>\n      <h1>Setlist and songbook management for practice and performance.<\u002Fh1>\n      <p class=\"lead\">Organize your songs, build setlists, and perform with confidence — all without an internet connection.<\u002Fp>\n      <div class=\"store-badges\">\n        <a class=\"store-badge\" href=\"https://apps.apple.com/ca/app/simple-sets/id6768031963\" target=\"_blank\" rel=\"noopener\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M16.365 1.43c0 1.14-.42 2.2-1.12 2.98-.84.94-2.2 1.66-3.32 1.57-.14-1.1.42-2.27 1.1-3 .76-.82 2.1-1.44 3.34-1.55zM20.5 17.05c-.6 1.38-.88 1.99-1.65 3.21-1.08 1.7-2.6 3.82-4.48 3.84-1.67.02-2.1-1.09-4.37-1.08-2.27.01-2.74 1.1-4.41 1.08-1.88-.02-3.32-1.93-4.4-3.63C-1.27 16.8-1.5 11.4.55 8.52c1.46-2.06 3.76-3.26 5.92-3.26 2.2 0 3.58 1.2 5.4 1.2 1.76 0 2.83-1.2 5.37-1.2 1.92 0 3.96 1.05 5.41 2.85-4.76 2.6-3.98 9.4 1.45 11.18z\"><\u002Fpath><\u002Fsvg>\n          <span><small>Download on the<\u002Fsmall>App Store<\u002Fspan>\n        <\u002Fa>\n        <a class=\"store-badge\" href=\"https://play.google.com/store/apps/details?id=com.viking.simple_sets&amp;hl=en\" target=\"_blank\" rel=\"noopener\">\n          <svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path fill=\"#00D3FF\" d=\"M3.6 1.84a1.5 1.5 0 0 0-.6 1.2v17.92c0 .5.24.94.6 1.2l10.07-10.16z\"><\u002Fpath><path fill=\"#FFCE00\" d=\"M17.9 8.36l-4.23 4.27 4.23 4.27 4.06-2.32c.86-.5.86-1.94 0-2.44z\"><\u002Fpath><path fill=\"#00F076\" d=\"M3.6 1.84l10.07 10.79 3.0-3.03L5.5.77c-.7-.4-1.46-.27-1.9 1.07z\"><\u002Fpath><path fill=\"#FF3A44\" d=\"M3.6 22.16c.44 1.34 1.2 1.47 1.9 1.07l11.17-6.36-3.0-3.03z\"><\u002Fpath><\u002Fsvg>\n          <span><small>Get it on<\u002Fsmall>Google Play<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <section>\n      <div class=\"section-eyebrow\">For the Stage<\u002Fdiv>\n      <h2>Built for live performance<\u002Fh2>\n      <p>Pull up any song in seconds during a live performance. Lyrics and chords are displayed in a clean, full-screen view optimized for low light. Songs are broken into pages you can navigate with a tap, swipe, or Bluetooth foot pedal — keeping your hands on your instrument the whole time. Auto-scroll handles the scrolling for you when you need it. Need to change keys at soundcheck? Transpose on the fly and save the new key with a single tap.<\u002Fp>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-eyebrow\">Chord Support<\u002Fdiv>\n      <h2>Chord support built in<\u002Fh2>\n      <p>Import ChordPro files or plain-text lyrics with chords above the words — Simple Sets detects and converts them automatically. Guitar and piano chord diagrams appear inline so you never have to look anything up mid-show.<\u002Fp>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-eyebrow\">Customization<\u002Fdiv>\n      <h2>Your songs, your way<\u002Fh2>\n      <p>Customize fonts, text size, colors, and line spacing per song. Set a scroll speed for each track. Use dual-view mode to see two verses side by side on a tablet. Print a physical setlist with all of your lyrics or chords in just a couple of taps.<\u002Fp>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-eyebrow\">Everything in One Place<\u002Fdiv>\n      <h2>One app for the whole gig<\u002Fh2>\n      <ul>\n        <li>Song library with search and alphabetical browsing<\u002Fli>\n        <li>Build setlists by dragging songs into any order<\u002Fli>\n        <li>Built-in metronome with tap tempo<\u002Fli>\n        <li>Share individual songs or entire setlists as <code style=\"font-family: inherit; color: var(--text);\">.simpleset<\u002Fcode> files<\u002Fli>\n        <li>Full backup and restore — export your library anytime, import on any device<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <div class=\"try\">\n      <div class=\"section-eyebrow\">Try Before You Buy<\u002Fdiv>\n      <h2>Free to start<\u002Fh2>\n      <p>Simple Sets is free to download and use for up to <strong>10 songs and 2 setlists<\u002Fstrong>. This lets you test your library, customize your layouts, and ensure your Bluetooth pedals work perfectly with no commitment.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"premium\">\n      <span class=\"premium-tag\">Premium<\u002Fspan>\n      <h2>Unlock the full stage experience<\u002Fh2>\n      <p>A single one-time purchase removes all limits and unlocks cloud features:<\u002Fp>\n      <ul>\n        <li><div><strong>Unlimited Songs &amp; Setlists<\u002Fstrong><span>Build a library for every gig.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <li><div><strong>Google Drive Backup<\u002Fstrong><span>Keep your entire songbook synced and safe across all your devices.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <li><div><strong>No Subscriptions<\u002Fstrong><span>Buy once, own it forever. No monthly fees, no ads, and no accounts required.<\u002Fspan><\u002Fdiv><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"download-cta\">\n      <h2>Get Simple Sets<\u002Fh2>\n      <div class=\"store-badges\">\n        <a class=\"store-badge\" href=\"https://apps.apple.com/ca/app/simple-sets/id6768031963\" target=\"_blank\" rel=\"noopener\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M16.365 1.43c0 1.14-.42 2.2-1.12 2.98-.84.94-2.2 1.66-3.32 1.57-.14-1.1.42-2.27 1.1-3 .76-.82 2.1-1.44 3.34-1.55zM20.5 17.05c-.6 1.38-.88 1.99-1.65 3.21-1.08 1.7-2.6 3.82-4.48 3.84-1.67.02-2.1-1.09-4.37-1.08-2.27.01-2.74 1.1-4.41 1.08-1.88-.02-3.32-1.93-4.4-3.63C-1.27 16.8-1.5 11.4.55 8.52c1.46-2.06 3.76-3.26 5.92-3.26 2.2 0 3.58 1.2 5.4 1.2 1.76 0 2.83-1.2 5.37-1.2 1.92 0 3.96 1.05 5.41 2.85-4.76 2.6-3.98 9.4 1.45 11.18z\"><\u002Fpath><\u002Fsvg>\n          <span><small>Download on the<\u002Fsmall>App Store<\u002Fspan>\n        <\u002Fa>\n        <a class=\"store-badge\" href=\"https://play.google.com/store/apps/details?id=com.viking.simple_sets&amp;hl=en\" target=\"_blank\" rel=\"noopener\">\n          <svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path fill=\"#00D3FF\" d=\"M3.6 1.84a1.5 1.5 0 0 0-.6 1.2v17.92c0 .5.24.94.6 1.2l10.07-10.16z\"><\u002Fpath><path fill=\"#FFCE00\" d=\"M17.9 8.36l-4.23 4.27 4.23 4.27 4.06-2.32c.86-.5.86-1.94 0-2.44z\"><\u00
